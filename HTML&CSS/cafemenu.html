<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cafe Menu</title>
        <link href="CafeMenu.css" rel="stylesheet">
    </head>
    <body>
    
        <div class="menu">
            <main>
                <h1>CAMPER CAFE</h1>
                <p class="established">Est.2025</p>
                <hr>
                <section>
                    <h2>Coffee</h2>
                    <img src ="images/coffee.png" alt=""coffee icon"/>
                    <article class="item">
                        <p class="flavour">French vanilla</p>
                        <p class="price">3.75</p>
                    </article>
                    <article class="item">
                        <p class="flavour">Hazelnut</p><p class="price">4.00</p>
                    </article> 
                    <article class="item">
                        <p class="flavour">Mocha</p><p class="price">4.50</p>
                    </article> 
                </section>
                <section>
                    <h2>Desert</h2>
                    <img src="images/dessert.png" alt="picion"/>
                    <article class="item">
                        <p class="dessert">Donut</p><p class="price">1.50</p>
                    </article>
                    <article class="item">
                        <p class="dessert">Cherry pie</p><p class="price">2.75</p>
                    </article>
                    <article class="item">
                        <p class="dessert">Cinnamon roll</p><p class="price">2.50</p>
                    </article>
                </section>
            </main>
            <hr class="bottom-line">"
            <footer>
                <p>
                    <a href="https://www.campercafe.in" target="_blank">Visit our website</a>
                </p>
                <p class="address">123, Camper cafe,India</p>
            </footer>
        </div>
    </body>
</html>
