<!DOCTYPE html>
<html>
    <head>
		<title>Job Application Form</title>
		<meta charset="UTF-8">
    </head>
    <body>

		<h1>Job Application Form</h1>
		<p>Please fill in the form below to apply for the position.</p>
		<hr>

		<form action="submit_form.php" method="post" enctype="multipart/form-data">
			<!-- Text Inputs -->
			<label for="fullname">Full Name:</label><br>
			<input type="text" id="fullname" name="fullname" required><br><br>

			<label for="email">Email Address:</label><br>
			<input type="email" id="email" name="email" required><br><br>

			<label for="phone">Phone Number:</label><br>
			<input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit number" required><br><br>

			<!-- Radio Buttons -->
			<p>Gender:</p>
			<input type="radio" id="male" name="gender" value="male" required>
			<label for="male">Male</label><br>
			<input type="radio" id="female" name="gender" value="female">
			<label for="female">Female</label><br>
			<input type="radio" id="other" name="gender" value="other">
			<label for="other">Other</label><br><br>

			<!-- Checkboxes -->
			<p>Skills:</p>
			<input type="checkbox" id="html" name="skills" value="HTML">
			<label for="html">HTML</label><br>
			<input type="checkbox" id="css" name="skills" value="CSS">
			<label for="css">CSS</label><br>
			<input type="checkbox" id="js" name="skills" value="JavaScript">
			<label for="js">JavaScript</label><br>
			<input type="checkbox" id="python" name="skills" value="Python">
			<label for="python">Python</label><br><br>

			<!-- Select Dropdown -->
			<label for="position">Position Applied For:</label><br>
			<select id="position" name="position" required>
				<option value="">--Select--</option>
				<option value="frontend">Frontend Developer</option>
				<option value="backend">Backend Developer</option>
				<option value="fullstack">Full Stack Developer</option>
				<option value="designer">UI/UX Designer</option>
			</select><br><br>

			<!-- Date and Time -->
			<label for="dob">Date of Birth:</label><br>
			<input type="date" id="dob" name="dob" required><br><br>

			<label for="interview">Preferred Interview Time:</label><br>
			<input type="datetime-local" id="interview" name="interview"><br><br>

			<!-- Number -->
			<label for="experience">Years of Experience:</label><br>
			<input type="number" id="experience" name="experience" min="0" max="50"><br><br>

			<!-- File Upload -->
			<label for="resume">Upload Resume:</label><br>
			<input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required><br><br>

			<!-- Textarea -->
			<label for="coverletter">Cover Letter:</label><br>
			<textarea id="coverletter" name="coverletter" rows="6" cols="40" placeholder="Write your cover letter here..."></textarea><br><br>

			<!-- Hidden Input -->
			<input type="hidden" name="form_id" value="job_app_2025">

			<!-- Buttons -->
			<input type="submit" value="Submit Application">
			<input type="reset" value="Reset Form">

		</form>

    </body>
</html>
